<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The First: Online Card Dystopia</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --primary: #00ffcc; --bg: #050505; }
        body { background: var(--bg); color: var(--primary); font-family: 'JetBrains+Mono', monospace; margin: 0; overflow: hidden; user-select: none; height: 100vh; }
        
        .crt::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.02), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.02));
            z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .glass { background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(0, 255, 204, 0.2); }
        
        .card {
            width: 80px; height: 110px; border: 1px solid var(--primary);
            background: rgba(0, 255, 204, 0.03); transition: 0.2s ease-out;
            cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; padding: 5px;
            box-shadow: inset 0 0 10px rgba(0, 255, 204, 0.05); flex-shrink: 0;
        }
        .card:hover:not(.disabled) { transform: translateY(-10px); box-shadow: 0 0 20px var(--primary); background: var(--primary); color: black; z-index: 50; }
        .card.disabled { opacity: 0.1; cursor: not-allowed; border-color: #333; filter: grayscale(1); }
        .card.selected { border: 2px solid #fff; box-shadow: 0 0 15px #fff; transform: translateY(-5px); }

        .glow-red { color: #ff3366; border-color: #ff3366; }
        .glow-blue { color: #3399ff; border-color: #3399ff; }
        .glow-gold { color: #ffcc33; border-color: #ffcc33; }
        
        .log-msg { border-left: 2px solid rgba(0, 255, 204, 0.2); padding-left: 8px; margin-bottom: 2px; font-size: 7px; opacity: 0.5; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="crt flex items-center justify-center">

    <!-- LOADING -->
    <div id="screen-loading" class="flex flex-col items-center text-center px-6">
        <div class="w-6 h-6 border-2 border-t-[#00ffcc] border-white/5 rounded-full animate-spin mb-4"></div>
        <p class="text-[8px] tracking-[0.4em] uppercase opacity-40 font-bold">Подключение к сети...</p>
    </div>

    <!-- AUTH -->
    <div id="screen-auth" class="hidden glass w-full max-w-xs p-6 rounded-xl z-10 shadow-2xl">
        <h1 class="text-3xl font-black italic tracking-tighter mb-1 text-center text-white uppercase font-mono">THE <span class="text-[#00ffcc]">FIRST</span></h1>
        <p class="text-[7px] text-center opacity-30 mb-6 tracking-[0.3em] uppercase font-bold font-mono">Manual Access</p>
        <form id="auth-form" class="flex flex-col gap-4">
            <input type="text" id="auth-login" placeholder="LOGIN" class="bg-white/5 border border-white/10 p-2 rounded-lg text-xs uppercase font-bold text-center outline-none focus:border-[#00ffcc]" required>
            <input type="password" id="auth-password" placeholder="PASS" class="bg-white/5 border border-white/10 p-2 rounded-lg text-xs text-center outline-none focus:border-[#00ffcc]" required>
            <p id="auth-error" class="text-red-500 text-[8px] uppercase font-bold text-center hidden"></p>
            <button type="submit" id="auth-submit-btn" class="bg-[#00ffcc] text-black py-3 font-black uppercase hover:bg-white transition-all rounded-lg text-xs shadow-lg">Вход</button>
            <button type="button" id="toggle-auth" class="text-[8px] text-zinc-500 hover:text-white uppercase tracking-widest text-center mt-1 font-bold">Регистрация</button>
        </form>
    </div>

    <!-- LOBBY -->
    <div id="screen-lobby" class="hidden glass w-full max-w-md p-6 rounded-2xl z-10 text-center">
        <div class="flex justify-between items-center mb-6 opacity-30 text-[7px] tracking-widest font-bold uppercase">
            <button onclick="location.reload()" class="hover:text-red-500">Exit</button>
            <p id="user-id-display">USER::---</p>
        </div>
        <h1 class="text-4xl font-black italic tracking-tighter mb-2 text-white font-mono uppercase font-bold leading-none">THE FIRST</h1>
        
        <div class="my-4 bg-white/5 p-4 rounded-xl border border-white/5 shadow-inner">
            <p class="text-[7px] opacity-40 uppercase mb-1">Статус Терминала</p>
            <p id="lobby-rank" class="text-2xl font-black uppercase text-[#00ffcc]">---</p>
            <p id="lobby-wins" class="text-[8px] mt-1 opacity-50 uppercase tracking-widest font-bold font-mono">Побед: 0</p>
        </div>

        <div class="flex flex-col gap-2">
            <button onclick="startQuickMatch()" id="quick-match-btn" class="w-full py-4 bg-white text-black font-black hover:bg-[#00ffcc] transition-all uppercase text-lg shadow-xl active:scale-95">Быстрый Риск</button>
            <div class="h-[1px] bg-white/5 my-1"></div>
            <div class="flex gap-2">
                <input type="text" id="room-input" maxlength="4" placeholder="КОД" class="flex-grow bg-white/5 border border-white/10 text-center text-white outline-none focus:border-[#00ffcc] font-black text-lg py-2 rounded-lg">
                <button onclick="joinDuel()" class="bg-red-600 text-white px-4 font-black hover:bg-red-500 transition-all uppercase text-[10px] rounded-lg">Вступить</button>
            </div>
            <button onclick="createNewDuel()" class="w-full py-2 border border-white/10 font-black hover:border-white transition-all uppercase text-[8px] opacity-40 hover:opacity-100">Создать Личный Канал</button>
        </div>
        <p id="lobby-status" class="mt-4 text-[#00ffcc88] text-[7px] uppercase tracking-[0.2em] font-black h-4 animate-pulse"></p>
    </div>

    <!-- GAME UI -->
    <div id="screen-game" class="hidden w-full max-w-4xl h-full flex flex-col justify-between py-2 z-10">
        <!-- Enemy -->
        <div class="flex justify-between items-center px-6 py-2 glass rounded-xl mx-4 border-red-500/20 shadow-lg relative overflow-hidden">
            <div class="text-left">
                <p class="text-[6px] opacity-40 uppercase font-bold tracking-widest">Оппонент</p>
                <p id="enemy-rank" class="text-xs font-black text-red-600 uppercase">ПОИСК...</p>
                <div class="text-2xl font-black text-white leading-none">HP: <span id="enemy-hp">0</span></div>
            </div>
            <div class="text-right">
                <div id="enemy-pulse" class="w-2 h-2 rounded-full ml-auto bg-zinc-800 transition-all duration-500 mb-1"></div>
                <p id="enemy-conn-status" class="text-[6px] opacity-20 uppercase font-bold italic tracking-widest">LINKING</p>
            </div>
        </div>

        <!-- Center Log -->
        <div class="flex flex-col items-center">
            <div id="turn-indicator" class="text-lg font-black uppercase tracking-[0.4em] mb-1 text-zinc-900 transition-all font-mono">АНАЛИЗ...</div>
            <div id="battle-log" class="h-16 overflow-y-auto w-full max-w-sm bg-black/80 p-2 border border-white/5 no-scrollbar text-[7px] italic opacity-40 font-mono shadow-inner"></div>
        </div>

        <!-- Player -->
        <div class="flex flex-col gap-2">
            <div class="px-8">
                <div class="text-left border-l-2 border-[#00ffcc] pl-3">
                    <p class="text-[6px] opacity-40 uppercase font-bold tracking-widest">Твой Протокол</p>
                    <p id="player-rank" class="text-xs font-black text-[#00ffcc] uppercase">---</p>
                    <div class="text-2xl font-black text-white leading-none">HP: <span id="player-hp">0</span></div>
                </div>
            </div>
            <!-- Hand -->
            <div id="hand" class="flex justify-center gap-1 h-32 items-end px-2 overflow-hidden">
                <!-- 5 cards -->
            </div>
        </div>
    </div>

    <!-- LOOT -->
    <div id="screen-loot" class="hidden glass w-full max-w-2xl p-6 rounded-xl z-[400] text-center flex flex-col h-[90vh]">
        <h2 class="text-xl font-black text-[#00ffcc] uppercase mb-1">Ресурс Обновлен</h2>
        <p class="text-[7px] opacity-30 uppercase mb-4 italic font-bold">Кликни на награду, затем на свою карту</p>
        <div class="flex-grow flex flex-col gap-2 overflow-hidden">
            <div class="bg-white/5 p-2 rounded-lg"><div id="loot-pool" class="flex justify-center gap-1 h-28"></div></div>
            <div class="bg-black/40 p-2 rounded-lg flex-grow overflow-y-auto no-scrollbar"><div id="loot-deck" class="flex flex-wrap justify-center gap-1"></div></div>
        </div>
        <button id="loot-confirm-btn" class="mt-4 bg-white text-black py-3 font-black uppercase rounded-lg text-xs hover:bg-[#00ffcc] transition-all font-bold">Завершить обновление</button>
    </div>

    <!-- END -->
    <div id="screen-end" class="hidden fixed inset-0 z-[500] bg-black flex flex-col items-center justify-center text-center p-10 font-mono">
        <h1 id="end-title" class="text-5xl font-black italic uppercase leading-none mb-4 text-red-600">ОБНУЛЕН</h1>
        <p id="end-sub" class="text-white uppercase tracking-[0.5em] text-[8px] mb-8 opacity-50 font-bold">Доступ аннулирован. Колода рандомизирована.</p>
        <button onclick="location.reload()" class="px-8 py-3 border border-white font-black uppercase tracking-widest text-xs hover:bg-white hover:text-black transition-all">Начать заново</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, update, onValue, off, remove, runTransaction } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMTaOtOQLsdJBLjN1AXO6X_NW47xSOMno",
            authDomain: "first-d1462.firebaseapp.com",
            projectId: "first-d1462",
            storageBucket: "first-d1462.firebasestorage.app",
            messagingSenderId: "965718104080",
            appId: "1:965718104080:web:0cd3a4aca0cc012a049295",
            databaseURL: "https://first-d1462-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const CARDS = {
            STRIKE: { name: 'УКОЛ', desc: '-2 HP', color: 'glow-red', val: 2 },
            BLOCK: { name: 'БЛОК', desc: 'ЗАЩИТА', color: 'glow-blue' },
            CRASH: { name: 'КРАХ', desc: 'HP / 2', color: 'glow-gold' },
            ALL_IN: { name: 'РИСК', desc: '-4 HP / СБРОС', color: 'glow-gold', val: 4 },
            SHADOW: { name: 'ТЕНЬ', desc: 'УКЛОНЕНИЕ', color: 'glow-blue' }
        };

        const RANKS = [
            { name: 'Первый', min: 0, color: '#00ffcc', loot: 2 },
            { name: 'Горожанин', min: 5, color: '#3399ff', loot: 3 },
            { name: 'Магистр', min: 15, color: '#ffcc33', loot: 4 },
            { name: 'Высший', min: 40, color: '#ff3366', loot: 6 }
        ];

        let currentUser, userData, authMode = 'login', currentRoomId, myRole, isDead = false;
        let selectedLootIdx = null, selectedDeckIdx = null, tempProposedLoot = [];

        signInAnonymously(auth).then(() => showScreen('screen-auth'));

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const login = document.getElementById('auth-login').value.trim().toUpperCase();
            const pass = document.getElementById('auth-password').value;
            const errEl = document.getElementById('auth-error');
            errEl.classList.add('hidden');

            try {
                const snap = await get(ref(db, 'users/' + login));
                if (authMode === 'login') {
                    if (!snap.exists()) throw new Error("ID НЕ НАЙДЕН");
                    if (snap.val().password !== pass) throw new Error("КЛЮЧ НЕ ВЕРЕН");
                    userData = snap.val();
                    if (!userData.deck) userData.deck = generateRandomDeck(10);
                } else {
                    if (snap.exists()) throw new Error("ID ЗАНЯТ");
                    userData = { login, password: pass, deck: generateRandomDeck(10), rank: 'Первый', wins: 0 };
                    await set(ref(db, 'users/' + login), userData);
                }
                currentUser = login; updateLobbyUI(); showScreen('screen-lobby');
            } catch (err) {
                errEl.innerText = err.message; errEl.classList.remove('hidden');
            }
        };

        function generateRandomDeck(count) {
            const keys = Object.keys(CARDS);
            return Array.from({length: count}, () => keys[Math.floor(Math.random() * keys.length)]);
        }

        document.getElementById('toggle-auth').onclick = () => {
            authMode = authMode === 'login' ? 'register' : 'login';
            document.getElementById('toggle-auth').innerText = authMode === 'login' ? 'Регистрация' : 'Вход';
            document.getElementById('auth-submit-btn').innerText = authMode === 'login' ? 'Вход' : 'Создать';
        };

        window.startQuickMatch = async () => {
            const btn = document.getElementById('quick-match-btn');
            btn.disabled = true; btn.innerText = "ПОИСК ЦЕЛИ...";
            const queueRef = ref(db, 'matchmaking');
            runTransaction(queueRef, (curr) => {
                if (!curr) return { waiter: { login: currentUser, rank: userData.rank } };
                if (curr.waiter && curr.waiter.login !== currentUser) {
                    const rid = Math.floor(1000 + Math.random() * 9000).toString();
                    return { matchedRoom: rid, waiter: curr.waiter };
                }
                return;
            }).then(async (res) => {
                if (res.committed) {
                    const s = res.snapshot.val();
                    if (s.matchedRoom) {
                        currentRoomId = s.matchedRoom; myRole = 'player2';
                        const p2Hand = shuffle([...userData.deck]).slice(0, 5);
                        await set(ref(db, 'rooms/' + currentRoomId), {
                            status: "active",
                            player1: { login: s.waiter.login, hp: 6, rank: s.waiter.rank, hand: [], blocking: false },
                            player2: { login: currentUser, hp: 6, rank: userData.rank, hand: p2Hand, blocking: false },
                            turn: "player1", lastAction: "РИСК НАЧАТ"
                        });
                        await remove(queueRef); showScreen('screen-game'); listenToRoom(currentRoomId);
                    } else {
                        onValue(queueRef, (q) => {
                            const d = q.val();
                            if (d && d.matchedRoom) {
                                currentRoomId = d.matchedRoom; myRole = 'player1';
                                off(queueRef); showScreen('screen-game'); listenToRoom(currentRoomId);
                            }
                        });
                    }
                }
            });
        };

        window.createNewDuel = async () => {
            const id = Math.floor(1000 + Math.random() * 9000).toString();
            currentRoomId = id; myRole = 'player1';
            const hand = shuffle([...userData.deck]).slice(0, 5);
            await set(ref(db, 'rooms/' + id), {
                status: "waiting",
                player1: { login: currentUser, hp: 6, rank: userData.rank, hand: hand, blocking: false },
                turn: "player1", lastAction: `Канал открыт: ${id}`
            });
            showScreen('screen-game'); listenToRoom(id);
        };

        window.joinDuel = async () => {
            const id = document.getElementById('room-input').value;
            if (!id) return;
            currentRoomId = id; myRole = 'player2';
            const hand = shuffle([...userData.deck]).slice(0, 5);
            const roomRef = ref(db, 'rooms/' + id);
            const snap = await get(roomRef);
            if (!snap.exists()) return alert("НЕТ КАНАЛА");
            await update(roomRef, {
                player2: { login: currentUser, hp: 6, rank: userData.rank, hand: hand, blocking: false },
                status: "active", lastAction: `${currentUser} В СЕТИ`
            });
            showScreen('screen-game'); listenToRoom(id);
        };

        function listenToRoom(id) {
            onValue(ref(db, 'rooms/' + id), (snap) => {
                const data = snap.val();
                if (!data) return;
                updateBattleUI(data);
            });
        }

        function updateBattleUI(data) {
            const me = data[myRole];
            if (!me) return;
            const enemyRole = myRole === 'player1' ? 'player2' : 'player1';
            const enemy = data[enemyRole];

            document.getElementById('player-hp').innerText = me.hp;
            document.getElementById('player-rank').innerText = userData.rank;
            
            const eRankEl = document.getElementById('enemy-rank');
            const eHpEl = document.getElementById('enemy-hp');
            const ePulse = document.getElementById('enemy-pulse');
            const eStatus = document.getElementById('enemy-conn-status');

            if (enemy) {
                eRankEl.innerText = `${enemy.login || 'ENEMY'} [${enemy.rank || '---'}]`;
                eHpEl.innerText = enemy.hp;
                ePulse.style.background = '#ff3366'; ePulse.classList.add('animate-pulse');
                eStatus.innerText = "SIGNAL LOCKED"; eStatus.style.opacity = "1";
            } else {
                eRankEl.innerText = "ПОИСК..."; eHpEl.innerText = "0";
                ePulse.style.background = '#333'; ePulse.classList.remove('animate-pulse');
                eStatus.innerText = "LINKING";
            }

            const isMyTurn = data.turn === myRole && data.status === 'active';
            const turnEl = document.getElementById('turn-indicator');
            if (data.status === 'waiting') {
                turnEl.innerText = "ОЖИДАНИЕ..."; turnEl.style.color = "#333";
            } else {
                turnEl.innerText = isMyTurn ? "ТВОЙ ХОД" : "АНАЛИЗ ВРАГА";
                turnEl.style.color = isMyTurn ? "#00ffcc" : "#400";
            }

            // --- КРИТИЧЕСКИЙ ПРОТОКОЛ ПОДДЕРЖАНИЯ РУКИ (5 КАРТ) ---
            let handArray = me.hand ? Object.values(me.hand).filter(v => typeof v === 'string') : [];
            
            // Если игра началась, а в руке меньше 5 карт — добираем до 5 из СВОЕЙ колоды 10
            if (data.status === 'active' && handArray.length < 5 && !isDead) {
                let drawPile = [...userData.deck];
                handArray.forEach(card => {
                    const idx = drawPile.indexOf(card);
                    if (idx > -1) drawPile.splice(idx, 1);
                });

                while (handArray.length < 5 && drawPile.length > 0) {
                    const rIdx = Math.floor(Math.random() * drawPile.length);
                    handArray.push(drawPile[rIdx]);
                    drawPile.splice(rIdx, 1);
                }
                
                // Если колода пуста (невозможно при 10), берем рандом
                while (handArray.length < 5) handArray.push(Object.keys(CARDS)[Math.floor(Math.random() * 5)]);

                update(ref(db, `rooms/${currentRoomId}/${myRole}`), { hand: handArray });
            }

            renderHand(handArray, isMyTurn);
            if(data.lastAction) addLog(data.lastAction);
            if (me.hp <= 0 && !isDead) resolveGame(false, enemy);
            if (enemy && enemy.hp <= 0 && !isDead) resolveGame(true, enemy);
        }

        function renderHand(hand, active) {
            const container = document.getElementById('hand'); 
            const newKeys = hand.join(',');
            if (container.dataset.hand === newKeys && container.dataset.active === String(active)) return;
            container.innerHTML = ''; container.dataset.hand = newKeys; container.dataset.active = active;

            hand.forEach((key, idx) => {
                const c = CARDS[key]; if (!c) return;
                const div = document.createElement('div');
                div.className = `card ${c.color} ${!active ? 'disabled' : ''}`;
                div.innerHTML = `<div class="text-[5px] opacity-40 font-black">#${key}</div><div class="text-[9px] font-black uppercase text-center leading-none">${c.name}</div><div class="text-[5px] opacity-60 text-center">${c.desc}</div>`;
                if(active) div.onclick = () => playCard(key, idx, hand);
                container.appendChild(div);
            });
        }

        async function playCard(key, idx, currentHand) {
            const roomRef = ref(db, 'rooms/' + currentRoomId);
            const snap = await get(roomRef);
            const data = snap.val();
            if (data.turn !== myRole || data.status !== 'active' || isDead) return;

            const enemyRole = myRole === 'player1' ? 'player2' : 'player1';
            const me = data[myRole], enemy = data[enemyRole];
            let newHand = [...currentHand]; newHand.splice(idx, 1);
            
            // Логика добора одной карты при ходе
            let drawPile = [...userData.deck];
            newHand.forEach(c => { const i = drawPile.indexOf(c); if(i > -1) drawPile.splice(i, 1); });
            if (drawPile.length > 0) newHand.push(drawPile[Math.floor(Math.random() * drawPile.length)]);

            let nEnemyHp = enemy.hp, nMyHp = me.hp, act = "";
            if (key === 'STRIKE') {
                if (enemy.blocking) act = `${userData.login}: УКОЛ В БЛОК`;
                else { nEnemyHp -= 2; act = `${userData.login}: ПРЯМОЙ УКОЛ`; }
            } else if (key === 'BLOCK') act = `${userData.login}: ЗАЩИТА`;
            else if (key === 'CRASH') { 
                const loss = Math.ceil(nEnemyHp / 2); nEnemyHp -= loss; 
                act = `${userData.login}: КРАХ (-${loss})`; 
            }
            else if (key === 'ALL_IN') { nEnemyHp -= 4; newHand = shuffle([...userData.deck]).slice(0, 5); act = `${userData.login}: РИСК!`; }
            else if (key === 'SHADOW') act = `${userData.login}: ТЕНЬ`;

            await update(roomRef, {
                [enemyRole + '/hp']: Math.max(0, nEnemyHp), [enemyRole + '/blocking']: false,
                [myRole + '/hp']: nMyHp, [myRole + '/blocking']: (key === 'BLOCK' || key === 'SHADOW'),
                [myRole + '/hand']: newHand, turn: enemyRole, lastAction: act
            });
        }

        async function resolveGame(won, enemyData) {
            if (isDead) return; isDead = true; off(ref(db, 'rooms/' + currentRoomId));
            if (won) {
                userData.wins++; const enemyRankData = RANKS.find(r => r.name === (enemyData?.rank || 'Первый')) || RANKS[0];
                startLootPhase(enemyRankData.loot);
            } else {
                userData.wins = 0; userData.rank = 'Первый'; userData.deck = generateRandomDeck(10);
                await set(ref(db, 'users/' + currentUser), userData); showScreen('screen-end');
            }
            if (myRole === 'player1') setTimeout(() => remove(ref(db, 'rooms/' + currentRoomId)), 6000);
        }

        function startLootPhase(count) {
            tempProposedLoot = generateRandomDeck(count); showScreen('screen-loot'); renderLootUI();
        }

        function renderLootUI() {
            const pool = document.getElementById('loot-pool'); const deck = document.getElementById('loot-deck');
            pool.innerHTML = ''; deck.innerHTML = '';
            tempProposedLoot.forEach((key, i) => {
                const div = createLootCard(key); if (selectedLootIdx === i) div.classList.add('selected');
                div.onclick = () => { selectedLootIdx = i; renderLootUI(); }; pool.appendChild(div);
            });
            userData.deck.forEach((key, i) => {
                const div = createLootCard(key); if (selectedDeckIdx === i) div.classList.add('selected');
                div.onclick = () => { selectedDeckIdx = i; renderLootUI(); }; deck.appendChild(div);
            });
            const btn = document.getElementById('loot-confirm-btn');
            if (selectedLootIdx !== null && selectedDeckIdx !== null) {
                btn.innerText = "ЗАМЕНИТЬ ДАННЫЕ"; btn.onclick = () => {
                    userData.deck[selectedDeckIdx] = tempProposedLoot[selectedLootIdx];
                    tempProposedLoot.splice(selectedLootIdx, 1); selectedLootIdx = null; selectedDeckIdx = null; renderLootUI();
                };
            } else { btn.innerText = "ЗАВЕРШИТЬ ЦИКЛ"; btn.onclick = finishLoot; }
        }

        function createLootCard(key) {
            const c = CARDS[key], div = document.createElement('div');
            div.className = `card ${c.color}`;
            div.innerHTML = `<div class="text-[5px] opacity-40">#${key}</div><div class="text-[9px] font-black uppercase text-center">${c.name}</div><div class="text-[5px] opacity-60 text-center">${c.desc}</div>`;
            return div;
        }

        async function finishLoot() {
            const newRank = [...RANKS].reverse().find(r => userData.wins >= r.min) || RANKS[0];
            userData.rank = newRank.name; await set(ref(db, 'users/' + currentUser), userData);
            showScreen('screen-lobby'); updateLobbyUI();
        }

        function showScreen(id) {
            ['screen-loading', 'screen-auth', 'screen-lobby', 'screen-game', 'screen-loot', 'screen-end'].forEach(s => {
                const el = document.getElementById(s); if (s === id) el.classList.remove('hidden'); else el.classList.add('hidden');
            });
        }

        function updateLobbyUI() {
            const rankInfo = RANKS.find(r => r.name === userData.rank) || RANKS[0];
            document.getElementById('user-id-display').innerText = `SESSION::${currentUser}`;
            document.getElementById('lobby-rank').innerText = userData.rank;
            document.getElementById('lobby-rank').style.color = rankInfo.color;
            document.getElementById('lobby-wins').innerText = `ПОБЕД В ЦИКЛЕ: ${userData.wins || 0}`;
        }

        function addLog(msg) {
            const log = document.getElementById('battle-log');
            if(log.firstChild && log.firstChild.innerText === `> ${msg}`) return;
            const div = document.createElement('div');
            div.className = "log-msg"; div.innerText = `> ${msg}`; log.prepend(div);
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1)); [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }
        window.oncontextmenu = (e) => e.preventDefault();
    </script>
</body>
</html>

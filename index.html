<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>The First: Online Battle</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #050505; color: #00ffcc; font-family: 'Courier New', monospace; overflow: hidden; }
        .crt::before { content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03)); z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none; }
        .card-btn { border: 1px solid #00ffcc; padding: 15px; cursor: pointer; transition: 0.2s; background: rgba(0, 255, 204, 0.05); }
        .card-btn:hover { background: #00ffcc; color: #000; box-shadow: 0 0 15px #00ffcc; }
        .hidden { display: none; }
    </style>
</head>
<body class="crt h-screen flex flex-col items-center justify-center p-4">

    <div id="lobby" class="text-center z-10">
        <h1 class="text-6xl font-bold mb-10 tracking-tighter italic">THE FIRST <span class="text-white">NET</span></h1>
        <button onclick="createNewDuel()" class="card-btn text-xl mb-4 w-64">СОЗДАТЬ ДУЭЛЬ</button>
        <p id="room-code-display" class="text-2xl text-white mb-8"></p>
        
        <div class="border-t border-zinc-800 pt-8 flex flex-col items-center">
            <input id="room-id-input" type="text" placeholder="КОД КОМНАТЫ" class="p-3 bg-transparent border border-zinc-700 mb-4 text-center text-white outline-none focus:border-cyan-400">
            <button onclick="joinDuel()" class="card-btn border-red-500 text-red-500 hover:bg-red-500 w-64">ВСТУПИТЬ В БОЙ</button>
        </div>
        <p id="status" class="mt-6 text-zinc-500 animate-pulse"></p>
    </div>

    <div id="game-ui" class="hidden w-full max-w-2xl z-10">
        <div class="flex justify-between mb-10 border-b border-zinc-800 pb-4">
            <div class="text-left">
                <p class="text-xs opacity-50 uppercase">Твой статус</p>
                <p class="text-2xl font-bold">ПЕРВЫЙ</p>
                <p class="text-4xl text-white mt-2">HP: <span id="my-hp">6</span></p>
            </div>
            <div class="text-right">
                <p class="text-xs opacity-50 uppercase">Враг</p>
                <p id="enemy-rank" class="text-2xl font-bold text-red-500 italic">???</p>
                <p class="text-4xl text-red-500 mt-2">HP: <span id="enemy-hp">6</span></p>
            </div>
        </div>

        <div id="turn-indicator" class="text-center mb-8 text-xl font-bold uppercase tracking-widest text-yellow-500">Ожидание...</div>

        <div class="grid grid-cols-2 gap-4" id="controls">
            <button onclick="playStrike()" id="strike-btn" class="card-btn">УКОЛ (-2 HP)</button>
            <button onclick="playBlock()" id="block-btn" class="card-btn border-blue-400 text-blue-400 hover:bg-blue-400">БЛОК (X)</button>
        </div>
        
        <div id="battle-log" class="mt-10 h-24 overflow-y-auto text-xs text-zinc-500 border-l border-zinc-800 pl-4"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMTaOtOQLsdJBLjN1AXO6X_NW47xSOMno",
            authDomain: "first-d1462.firebaseapp.com",
            projectId: "first-d1462",
            storageBucket: "first-d1462.firebasestorage.app",
            messagingSenderId: "965718104080",
            appId: "1:965718104080:web:0cd3a4aca0cc012a049295",
            databaseURL: "https://first-d1462-default-rtdb.firebaseio.com"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        let roomID = null;
        let myRole = null; // player1 или player2
        let myData = { hp: 6 };
        let enemyData = { hp: 6 };
        let currentTurn = "";

        // ФУНКЦИИ ЛОББИ
        window.createNewDuel = async function() {
            roomID = Math.floor(1000 + Math.random() * 9000);
            myRole = 'player1';
            const roomRef = ref(db, 'rooms/' + roomID);
            
            await set(roomRef, {
                status: "waiting",
                player1: { hp: 6, rank: "Первый" },
                player2: { hp: 6, rank: "Первый" },
                turn: "player1"
            });

            document.getElementById('room-code-display').innerText = "КОД: " + roomID;
            document.getElementById('status').innerText = "Ждем второго игрока...";
            listenToRoom();
        };

        window.joinDuel = function() {
            roomID = document.getElementById('room-id-input').value;
            if(!roomID) return;
            myRole = 'player2';
            update(ref(db, 'rooms/' + roomID), { status: "active" });
            listenToRoom();
        };

        function listenToRoom() {
            onValue(ref(db, 'rooms/' + roomID), (snapshot) => {
                const data = snapshot.val();
                if(!data) return;

                if(data.status === "active") {
                    document.getElementById('lobby').classList.add('hidden');
                    document.getElementById('game-ui').classList.remove('hidden');
                    
                    currentTurn = data.turn;
                    myData = data[myRole];
                    enemyData = (myRole === 'player1') ? data.player2 : data.player1;

                    updateUI();
                }
            });
        }

        function updateUI() {
            document.getElementById('my-hp').innerText = myData.hp;
            document.getElementById('enemy-hp').innerText = enemyData.hp;
            
            const isMyTurn = (currentTurn === myRole);
            document.getElementById('turn-indicator').innerText = isMyTurn ? "Твой ход" : "Ход врага";
            document.getElementById('strike-btn').disabled = !isMyTurn;
            document.getElementById('strike-btn').style.opacity = isMyTurn ? "1" : "0.3";

            if(myData.hp <= 0) alert("ТЫ ОБНУЛЕН.");
            if(enemyData.hp <= 0) alert("ВРАГ ОБНУЛЕН. ТЫ - ВЫСШИЙ.");
        }

        // БОЕВАЯ ЛОГИКА
        window.playStrike = function() {
            if(currentTurn !== myRole) return;
            
            const enemyRole = (myRole === 'player1') ? 'player2' : 'player1';
            const newEnemyHP = Math.max(0, enemyData.hp - 2);
            const nextTurn = enemyRole;

            const updates = {};
            updates[`rooms/${roomID}/${enemyRole}/hp`] = newEnemyHP;
            updates[`rooms/${roomID}/turn`] = nextTurn;
            updates[`rooms/${roomID}/lastLog`] = `${myRole} нанес укол!`;

            update(ref(db), updates);
            log(`Ты нанес укол. У врага осталось ${newEnemyHP} HP`);
        };

        function log(msg) {
            const l = document.getElementById('battle-log');
            l.innerHTML = `> ${msg}<br>` + l.innerHTML;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The First: Online Card Dystopia</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        
        :root { --primary: #00ffcc; --bg: #050505; }
        body { background: var(--bg); color: var(--primary); font-family: 'JetBrains+Mono', monospace; margin: 0; overflow: hidden; user-select: none; }

        /* CRT Эффект */
        .crt::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .glass { background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(0, 255, 204, 0.2); }

        .card {
            width: 140px; height: 200px; border: 1px solid var(--primary);
            background: rgba(0, 255, 204, 0.03); transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; padding: 15px;
        }
        .card:hover:not(.disabled) { transform: translateY(-25px) rotate(3deg); box-shadow: 0 0 40px var(--primary); background: var(--primary); color: black; z-index: 50; }
        .card.disabled { opacity: 0.15; cursor: not-allowed; border-color: #333; }

        .glow-red { color: #ff3366; border-color: #ff3366; }
        .glow-blue { color: #3399ff; border-color: #3399ff; }
        .glow-gold { color: #ffcc33; border-color: #ffcc33; }

        input { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; }
        input:focus { border-color: var(--primary) !important; outline: none; box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); }

        .hidden { display: none !important; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="crt h-screen flex items-center justify-center">

    <!-- ЭКРАН ЗАГРУЗКИ -->
    <div id="screen-loading" class="flex flex-col items-center max-w-sm text-center">
        <div class="w-16 h-16 border-4 border-t-[#00ffcc] border-zinc-900 rounded-full animate-spin mb-6"></div>
        <p class="text-[10px] tracking-[0.5em] uppercase opacity-50 mb-4">Авторизация терминала...</p>
        <div id="debug-log" class="text-[8px] text-zinc-600 uppercase tracking-widest space-y-1"></div>
        <div id="critical-error" class="hidden mt-8 p-4 border border-red-500 bg-red-500/10 rounded-lg">
            <p class="text-xs text-red-500 font-bold uppercase mb-2">Ошибка Системы</p>
            <p id="error-text" class="text-[9px] text-white/70"></p>
        </div>
    </div>

    <!-- ЭКРАН АВТОРИЗАЦИИ (МАНУАЛЬНЫЙ) -->
    <div id="screen-auth" class="hidden glass w-full max-w-md p-10 rounded-2xl z-10 shadow-2xl">
        <h1 class="text-6xl font-black italic tracking-tighter mb-2 text-center text-white uppercase font-mono">THE <span class="text-[#00ffcc]">FIRST</span></h1>
        <p class="text-[9px] text-center opacity-40 mb-10 tracking-[0.4em] uppercase font-bold">Manual Access Override</p>
        
        <form id="auth-form" class="flex flex-col gap-6">
            <div class="flex flex-col gap-2">
                <label class="text-[9px] uppercase tracking-widest opacity-60 ml-1 font-bold">Идентификатор (Логин)</label>
                <input type="text" id="auth-login" placeholder="NICKNAME" class="p-4 rounded-xl text-lg uppercase" required>
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-[9px] uppercase tracking-widest opacity-60 ml-1 font-bold">Ключ доступа (Пароль)</label>
                <input type="password" id="auth-password" placeholder="••••••••" class="p-4 rounded-xl text-lg" required>
            </div>
            
            <p id="auth-error" class="text-red-500 text-[10px] uppercase font-bold text-center bg-red-500/10 py-2 border border-red-500/20 hidden"></p>
            
            <button type="submit" id="auth-submit-btn" class="bg-[#00ffcc] text-black py-5 font-black uppercase hover:bg-white transition-all transform active:scale-95 rounded-xl text-xl shadow-[0_0_20px_rgba(0,255,204,0.3)]">
                Войти
            </button>
            
            <button type="button" id="toggle-auth" class="text-[10px] text-zinc-500 hover:text-white uppercase tracking-widest text-center mt-4 font-bold">
                Нет аккаунта? Зарегистрировать новый
            </button>
        </form>
    </div>

    <!-- ЛОББИ -->
    <div id="screen-lobby" class="hidden glass w-full max-w-2xl p-12 rounded-3xl z-10 text-center border-white/10">
        <div class="flex justify-between items-center mb-10 opacity-30 text-[9px] tracking-widest font-bold">
            <button onclick="location.reload()" class="hover:text-red-500 transition-colors uppercase border-b border-transparent hover:border-red-500">Выход</button>
            <p id="user-id-display">UID::USER</p>
        </div>
        
        <h1 class="text-8xl font-black italic tracking-tighter mb-4 text-white">THE <span class="text-[#00ffcc]">FIRST</span></h1>
        
        <div class="grid grid-cols-2 gap-10 my-16 bg-white/5 p-8 rounded-2xl border border-white/5">
            <div class="text-left">
                <p class="text-[10px] opacity-40 uppercase tracking-widest mb-2 font-bold">Ранг Профиля</p>
                <p id="lobby-rank" class="text-4xl font-black italic uppercase text-[#00ffcc]">---</p>
            </div>
            <div class="text-right">
                <p class="text-[10px] opacity-40 uppercase tracking-widest mb-2 font-bold">Общая Колода</p>
                <p id="lobby-cards" class="text-6xl font-black text-white">0</p>
            </div>
        </div>

        <div class="flex flex-col gap-6">
            <button onclick="createNewDuel()" class="w-full py-7 border-2 border-white font-black hover:bg-white hover:text-black transition-all uppercase tracking-[0.2em] text-2xl shadow-xl">Создать Канал Дуэли</button>
            <div class="flex gap-4">
                <input type="text" id="room-input" maxlength="4" placeholder="КОД ЦЕЛИ" class="flex-grow bg-white/5 border border-white/10 text-center text-white outline-none focus:border-[#00ffcc] font-black text-3xl py-5 rounded-xl">
                <button onclick="joinDuel()" class="border-2 border-red-600 text-red-600 px-12 font-black hover:bg-red-600 hover:text-white transition-all uppercase text-xl rounded-xl">Перехват</button>
            </div>
        </div>
        <p id="lobby-status" class="mt-10 text-[#00ffcc88] text-[10px] uppercase tracking-[0.4em] font-black h-4 animate-pulse"></p>
    </div>

    <!-- ИГРОВОЙ ИНТЕРФЕЙС -->
    <div id="screen-game" class="hidden w-full max-w-7xl h-full flex flex-col justify-between py-12 z-10">
        <div class="flex justify-between items-center px-20 py-10 glass rounded-3xl mx-10 border-red-500/20">
            <div class="text-left">
                <p class="text-[10px] opacity-40 uppercase tracking-[0.4em] mb-1">Объект</p>
                <p id="enemy-rank" class="text-3xl font-black italic text-red-600 uppercase tracking-tighter">ВРАГ</p>
                <div class="text-8xl font-black text-white mt-2">HP: <span id="enemy-hp">6</span></div>
            </div>
            <div id="enemy-pulse-container" class="flex flex-col items-end">
                <div id="enemy-pulse" class="w-6 h-6 rounded-full bg-zinc-800 transition-all duration-500"></div>
                <p class="text-[10px] opacity-20 uppercase tracking-widest mt-4 font-bold">Signal Locked</p>
            </div>
        </div>

        <div class="flex flex-col items-center">
            <div id="turn-indicator" class="text-4xl font-black uppercase tracking-[1em] mb-10 text-zinc-800 transition-all">Анализ...</div>
            <div id="battle-log" class="h-44 overflow-y-auto w-full max-w-2xl bg-black/80 p-8 border border-white/5 no-scrollbar text-xs italic"></div>
        </div>

        <div class="flex flex-col gap-12">
            <div class="flex justify-between items-end px-20">
                <div class="text-left border-l-8 border-[#00ffcc] pl-8">
                    <p class="text-[10px] opacity-40 uppercase tracking-[0.4em] mb-1">Протокол</p>
                    <p id="player-rank" class="text-3xl font-black text-[#00ffcc] uppercase tracking-tighter">ПЕРВЫЙ</p>
                    <div class="text-8xl font-black text-white mt-2">HP: <span id="player-hp">6</span></div>
                </div>
            </div>
            <div id="hand" class="flex justify-center gap-8 h-64 items-end px-10"></div>
        </div>
    </div>

    <!-- ЭКРАН ЗАВЕРШЕНИЯ -->
    <div id="screen-end" class="hidden fixed inset-0 z-[500] bg-black flex flex-col items-center justify-center text-center p-10">
        <h1 id="end-title" class="text-[12rem] font-black italic uppercase leading-none mb-6 text-white">ОБНУЛЕН</h1>
        <p id="end-sub" class="text-white uppercase tracking-[1.2em] text-2xl mb-24 font-light opacity-50 font-bold">Цикл завершен.</p>
        <button onclick="location.reload()" class="px-24 py-8 border-4 border-white font-black uppercase tracking-[0.6em] text-3xl hover:bg-white hover:text-black transition-all">В Лобби</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, updateDoc, onSnapshot, deleteDoc, collection } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // КОНФИГУРАЦИЯ
        const firebaseConfig = {
            apiKey: "AIzaSyBMTaOtOQLsdJBLjN1AXO6X_NW47xSOMno",
            authDomain: "first-d1462.firebaseapp.com",
            projectId: "first-d1462",
            storageBucket: "first-d1462.firebasestorage.app",
            messagingSenderId: "965718104080",
            appId: "1:965718104080:web:0cd3a4aca0cc012a049295"
        };

        const CARDS = {
            STRIKE: { name: 'УКОЛ', desc: '-2 HP', color: 'glow-red', val: 2 },
            BLOCK: { name: 'БЛОК', desc: 'ЗАЩИТА', color: 'glow-blue' },
            ECHO: { name: 'ЭХО', desc: 'HP x 2', color: 'glow-gold' },
            ALL_IN: { name: 'ВА-БАНК', desc: '-4 HP / СБРОС', color: 'glow-gold', val: 4 },
            SHADOW: { name: 'ТЕНЬ', desc: 'УКЛОНЕНИЕ', color: 'glow-blue' }
        };

        const RANKS = [
            { name: 'Первый', min: 0, color: '#00ffcc' },
            { name: 'Горожанин', min: 16, color: '#3399ff' },
            { name: 'Магистр', min: 51, color: '#ffcc33' },
            { name: 'Высший', min: 151, color: '#ff3366' }
        ];

        let app, auth, db, currentUser;
        let userData = { cards: 6, rank: 'Первый', wins: 0, password: '' };
        let authMode = 'login';
        let currentRoomId = null;
        let myRole = null;
        let isDead = false;
        let roomUnsubscribe = null;
        const appId = "first-card-dystopia-v3";

        function debug(msg) {
            const log = document.getElementById('debug-log');
            const div = document.createElement('div');
            div.innerText = `> ${msg}`;
            log.appendChild(div);
        }

        // Инициализация Firebase
        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            
            // Анонимный вход в фоне для доступа к Firestore
            signInAnonymously(auth).then(() => {
                debug("Система: OK");
                showScreen('screen-auth');
            }).catch(e => {
                debug("Ошибка связи: " + e.message);
                showScreen('screen-auth');
            });
        } catch (e) {
            console.error(e);
        }

        // --- CUSTOM AUTH LOGIC (БЕЗ FIREBASE AUTH) ---
        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const login = document.getElementById('auth-login').value.trim().toUpperCase();
            const pass = document.getElementById('auth-password').value;
            const errEl = document.getElementById('auth-error');
            errEl.classList.add('hidden');

            if (login.length < 3) return alert("Логин слишком короткий");

            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', login);
            
            try {
                const snap = await getDoc(userRef);
                
                if (authMode === 'login') {
                    if (!snap.exists()) {
                        throw new Error("ПОЛЬЗОВАТЕЛЬ НЕ НАЙДЕН");
                    }
                    const data = snap.data();
                    if (data.password !== pass) {
                        throw new Error("НЕВЕРНЫЙ КЛЮЧ ДОСТУПА");
                    }
                    userData = data;
                    loginSuccess(login);
                } else {
                    if (snap.exists()) {
                        throw new Error("ИМЯ УЖЕ ЗАНЯТО");
                    }
                    userData = { login, password: pass, cards: 6, wins: 0, rank: 'Первый' };
                    await setDoc(userRef, userData);
                    loginSuccess(login);
                }
            } catch (err) {
                errEl.innerText = err.message;
                errEl.classList.remove('hidden');
            }
        };

        function loginSuccess(login) {
            currentUser = login;
            document.getElementById('user-id-display').innerText = `USER::${login}`;
            calculateRank();
            updateLobbyUI();
            showScreen('screen-lobby');
        }

        document.getElementById('toggle-auth').onclick = () => {
            authMode = authMode === 'login' ? 'register' : 'login';
            document.getElementById('toggle-auth').innerText = authMode === 'login' ? 'Нет аккаунта? Зарегистрировать новый' : 'Уже есть аккаунт? Войти';
            document.getElementById('auth-submit-btn').innerText = authMode === 'login' ? 'Войти' : 'Создать Протокол';
        };

        // --- ДУЭЛИ (С ИСПОЛЬЗОВАНИЕМ CUSTOM LOGIN) ---
        window.createNewDuel = async () => {
            if (userData.cards <= 0) return alert("НЕТ КАРТ ДЛЯ ИГРЫ");
            const id = Math.floor(1000 + Math.random() * 9000).toString();
            currentRoomId = id;
            myRole = 'player1';
            
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', id);
            await setDoc(roomRef, {
                status: "waiting",
                player1: { uid: currentUser, hp: 6, rank: userData.rank, hand: generateHand(), blocking: false },
                player2: null,
                turn: "player1",
                lastAction: "ОЖИДАНИЕ ЦЕЛИ"
            });
            
            document.getElementById('lobby-status').innerText = `КАНАЛ: ${id}`;
            listenToRoom(id);
        };

        window.joinDuel = async () => {
            const id = document.getElementById('room-input').value;
            if (!id || userData.cards <= 0) return;
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', id);
            const snap = await getDoc(roomRef);
            if (!snap.exists()) return alert("КАНАЛ НЕ НАЙДЕН");
            
            currentRoomId = id;
            myRole = 'player2';
            await updateDoc(roomRef, {
                player2: { uid: currentUser, hp: 6, rank: userData.rank, hand: generateHand(), blocking: false },
                status: "active",
                lastAction: "КОНТАКТ УСТАНОВЛЕН"
            });
            listenToRoom(id);
        };

        // --- ОСТАЛЬНАЯ ЛОГИКА ---
        function calculateRank() {
            const rank = [...RANKS].reverse().find(r => userData.cards >= r.min) || RANKS[0];
            userData.rank = rank.name;
        }

        function updateLobbyUI() {
            const rank = RANKS.find(r => r.name === userData.rank);
            const rankEl = document.getElementById('lobby-rank');
            rankEl.innerText = userData.rank;
            rankEl.style.color = rank.color;
            document.getElementById('lobby-cards').innerText = userData.cards;
        }

        function generateHand() {
            const keys = Object.keys(CARDS);
            return Array.from({length: 5}, () => keys[Math.floor(Math.random() * keys.length)]);
        }

        function listenToRoom(id) {
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', id);
            roomUnsubscribe = onSnapshot(roomRef, (snap) => {
                const data = snap.data();
                if (!data) return;
                if (data.status === 'active') {
                    showScreen('screen-game');
                    updateBattleUI(data);
                }
            });
        }

        function updateBattleUI(data) {
            const me = data[myRole];
            const enemyRole = myRole === 'player1' ? 'player2' : 'player1';
            const enemy = data[enemyRole];

            document.getElementById('player-hp').innerText = me.hp;
            document.getElementById('player-rank').innerText = me.rank;
            if (enemy) {
                document.getElementById('enemy-hp').innerText = enemy.hp;
                document.getElementById('enemy-rank').innerText = enemy.rank;
                document.getElementById('enemy-pulse').classList.add('bg-red-600', 'shadow-[0_0_15px_#ff3366]');
            }

            const isMyTurn = data.turn === myRole;
            const turnEl = document.getElementById('turn-indicator');
            turnEl.innerText = isMyTurn ? "ТВОЙ ХОД" : "АНАЛИЗ ВРАГА";
            turnEl.style.color = isMyTurn ? "#00ffcc" : "#1a1a1a";

            renderHand(me.hand, isMyTurn);
            if(data.lastAction) addLog(data.lastAction);

            if (me.hp <= 0 && !isDead) resolveGame(false);
            if (enemy && enemy.hp <= 0 && !isDead) resolveGame(true);
        }

        function renderHand(hand, active) {
            const container = document.getElementById('hand');
            container.innerHTML = '';
            hand.forEach((key, idx) => {
                const c = CARDS[key];
                const div = document.createElement('div');
                div.className = `card ${c.color} ${!active ? 'disabled' : ''}`;
                div.innerHTML = `<div class="text-[9px] opacity-40 font-black">#${key}</div>
                                 <div class="text-2xl font-black leading-none uppercase">${c.name}</div>
                                 <div class="text-[10px] opacity-60 font-bold">${c.desc}</div>`;
                if(active) div.onclick = () => playCard(key, idx);
                container.appendChild(div);
            });
        }

        async function playCard(key, idx) {
            const roomRef = doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId);
            const snap = await getDoc(roomRef);
            const data = snap.data();
            if (data.turn !== myRole || isDead) return;

            const enemyRole = (myRole === 'player1') ? 'player2' : 'player1';
            const me = data[myRole];
            const enemy = data[enemyRole];

            let nEnemyHp = enemy.hp, nMyHp = me.hp, act = "", nHand = [...me.hand];
            nHand.splice(idx, 1);

            if (key === 'STRIKE') {
                if (enemy.blocking) act = `${userData.login}: УКОЛ В БЛОК`;
                else { nEnemyHp -= 2; act = `${userData.login}: УКОЛ (-2)`; }
            } else if (key === 'BLOCK') act = `${userData.login}: ЗАЩИТА`;
            else if (key === 'ECHO') { nMyHp *= 2; act = `${userData.login}: ЭХО (x2)`; }
            else if (key === 'ALL_IN') { nEnemyHp -= 4; nHand = []; act = `${userData.login}: ВА-БАНК!`; }
            else if (key === 'SHADOW') act = `${userData.login}: ТЕНЬ`;

            if (nHand.length === 0) nHand = generateHand();

            await updateDoc(roomRef, {
                [enemyRole + '/hp']: Math.max(0, nEnemyHp),
                [enemyRole + '/blocking']: false,
                [myRole + '/hp']: nMyHp,
                [myRole + '/blocking']: (key === 'BLOCK' || key === 'SHADOW'),
                [myRole + '/hand']: nHand,
                turn: enemyRole, lastAction: act
            });
        }

        async function resolveGame(won) {
            isDead = true;
            if(roomUnsubscribe) roomUnsubscribe();
            
            let cardChange = won ? 4 : -3;
            userData.cards = Math.max(0, userData.cards + cardChange);
            if (won) userData.wins++;
            calculateRank();

            const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'users', currentUser);
            await setDoc(userRef, userData);

            if (myRole === 'player1') {
                setTimeout(async () => {
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'rooms', currentRoomId));
                }, 4000);
            }

            showScreen('screen-end');
            const title = document.getElementById('end-title');
            if (won) {
                title.innerText = "ВЫСШИЙ";
                title.style.color = "#00ffcc";
                document.getElementById('end-sub').innerText = `РЕСУРС ПОПОЛНЕН: +${cardChange} КАРТ`;
            } else {
                title.innerText = "ОБНУЛЕН";
                title.style.color = "#ff3366";
                document.getElementById('end-sub').innerText = "ПОТЕРЯНО 3 КАРТЫ";
            }
        }

        function showScreen(id) {
            ['screen-loading', 'screen-auth', 'screen-lobby', 'screen-game', 'screen-end'].forEach(s => {
                document.getElementById(s).classList.add('hidden');
            });
            document.getElementById(id).classList.remove('hidden');
        }

        function addLog(msg) {
            const log = document.getElementById('battle-log');
            if(log.firstChild && log.firstChild.innerText === `> ${msg}`) return;
            const div = document.createElement('div');
            div.className = "mb-1 border-l border-white/10 pl-2 opacity-50";
            div.innerText = `> ${msg}`;
            log.prepend(div);
        }

        window.oncontextmenu = (e) => e.preventDefault();
    </script>
</body>
</html>

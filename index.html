<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The First: Online Card Dystopia</title>
    <link rel="icon" href="data:;base64,iVBORw0KGgo=">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        :root { --primary: #00ffcc; --bg: #050505; }
        body { background: var(--bg); color: var(--primary); font-family: 'JetBrains+Mono', monospace; margin: 0; overflow: hidden; user-select: none; }
        
        /* CRT Эффект */
        .crt::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            z-index: 100; background-size: 100% 2px, 3px 100%; pointer-events: none;
        }

        .glass { background: rgba(0, 0, 0, 0.9); backdrop-filter: blur(20px); border: 1px solid rgba(0, 255, 204, 0.2); }
        
        /* Компактные карты для 10 штук */
        .card {
            width: 100px; height: 150px; border: 1px solid var(--primary);
            background: rgba(0, 255, 204, 0.02); transition: 0.2s ease-out;
            cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; padding: 8px;
            box-shadow: inset 0 0 10px rgba(0, 255, 204, 0.05);
            flex-shrink: 0;
        }
        .card:hover:not(.disabled) { transform: translateY(-15px); box-shadow: 0 0 20px var(--primary); background: var(--primary); color: black; z-index: 50; }
        .card.disabled { opacity: 0.15; cursor: not-allowed; border-color: #333; filter: grayscale(1); }

        input { background: rgba(255, 255, 255, 0.05) !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; color: white !important; outline: none; text-align: center; }
        .hidden { display: none !important; }
        .glow-red { color: #ff3366; border-color: #ff3366; }
        .glow-blue { color: #3399ff; border-color: #3399ff; }
        .glow-gold { color: #ffcc33; border-color: #ffcc33; }
        
        .log-msg { border-left: 2px solid rgba(0, 255, 204, 0.2); padding-left: 8px; margin-bottom: 4px; font-size: 10px; opacity: 0.5; }
    </style>
</head>
<body class="crt h-screen flex items-center justify-center">

    <!-- INITIALIZATION -->
    <div id="screen-loading" class="flex flex-col items-center text-center px-6">
        <div class="w-10 h-10 border-2 border-t-[#00ffcc] border-white/5 rounded-full animate-spin mb-6"></div>
        <p class="text-[10px] tracking-[0.5em] uppercase opacity-40 mb-4 font-bold">Синхронизация протокола...</p>
        <div id="status-log" class="text-[8px] space-y-1 uppercase opacity-30"></div>
    </div>

    <!-- AUTHENTICATION -->
    <div id="screen-auth" class="hidden glass w-full max-w-sm p-8 rounded-2xl z-10 shadow-2xl">
        <h1 class="text-4xl font-black italic tracking-tighter mb-1 text-center text-white uppercase leading-none font-mono">THE <span class="text-[#00ffcc]">FIRST</span></h1>
        <p class="text-[8px] text-center opacity-30 mb-8 tracking-[0.4em] uppercase font-bold">Manual Access Override</p>
        
        <form id="auth-form" class="flex flex-col gap-5">
            <div class="flex flex-col gap-2">
                <label class="text-[8px] uppercase tracking-widest opacity-60 ml-1 font-bold">Идентификатор</label>
                <input type="text" id="auth-login" placeholder="LOGIN" class="p-3 rounded-xl text-md uppercase font-bold" required>
            </div>
            <div class="flex flex-col gap-2">
                <label class="text-[8px] uppercase tracking-widest opacity-60 ml-1 font-bold">Пароль</label>
                <input type="password" id="auth-password" placeholder="••••••••" class="p-3 rounded-xl text-md" required>
            </div>
            <p id="auth-error" class="text-red-500 text-[9px] uppercase font-bold text-center hidden"></p>
            <button type="submit" id="auth-submit-btn" class="bg-[#00ffcc] text-black py-4 font-black uppercase hover:bg-white transition-all transform active:scale-95 rounded-xl text-md shadow-lg font-mono">Вход</button>
            <button type="button" id="toggle-auth" class="text-[9px] text-zinc-500 hover:text-white uppercase tracking-widest text-center mt-2 font-bold">Создать новый аккаунт</button>
        </form>
    </div>

    <!-- LOBBY -->
    <div id="screen-lobby" class="hidden glass w-full max-w-xl p-10 rounded-3xl z-10 text-center">
        <div class="flex justify-between items-center mb-8 opacity-30 text-[8px] tracking-widest font-bold uppercase">
            <button onclick="location.reload()" class="hover:text-red-500">Exit</button>
            <p id="user-id-display">SESSION::---</p>
        </div>
        <h1 class="text-6xl font-black italic tracking-tighter mb-4 text-white uppercase leading-none font-mono">THE <span class="text-[#00ffcc]">FIRST</span></h1>
        <div class="grid grid-cols-2 gap-8 my-10 bg-white/5 p-6 rounded-2xl border border-white/5">
            <div class="text-left"><p class="text-[9px] opacity-40 uppercase font-bold tracking-widest">Статус</p><p id="lobby-rank" class="text-3xl font-black italic uppercase text-[#00ffcc]">---</p></div>
            <div class="text-right"><p class="text-[9px] opacity-40 uppercase font-bold tracking-widest">Общий Ресурс</p><p id="lobby-cards" class="text-5xl font-black text-white">0</p></div>
        </div>
        <div class="flex flex-col gap-4">
            <button onclick="createNewDuel()" class="w-full py-5 border-2 border-white font-black hover:bg-white hover:text-black transition-all uppercase tracking-[0.2em] text-xl shadow-xl">Создать Дуэль</button>
            <div class="flex gap-3">
                <input type="text" id="room-input" maxlength="4" placeholder="КОД" class="flex-grow bg-white/5 border border-white/10 text-center text-white outline-none focus:border-[#00ffcc] font-black text-2xl py-3 rounded-xl">
                <button onclick="joinDuel()" class="border-2 border-red-600 text-red-600 px-8 font-black hover:bg-red-600 hover:text-white transition-all uppercase text-lg rounded-xl">Вступить</button>
            </div>
        </div>
        <p id="lobby-status" class="mt-6 text-[#00ffcc88] text-[9px] uppercase tracking-[0.4em] font-black h-4 animate-pulse"></p>
    </div>

    <!-- GAME UI -->
    <div id="screen-game" class="hidden w-full max-w-6xl h-full flex flex-col justify-between py-6 z-10">
        <!-- Enemy -->
        <div class="flex justify-between items-center px-12 py-6 glass rounded-2xl mx-10 border-red-500/20 shadow-xl">
            <div class="text-left">
                <p class="text-[8px] opacity-40 uppercase tracking-[0.4em] mb-1 font-bold">Оппонент</p>
                <p id="enemy-rank" class="text-xl font-black italic text-red-600 uppercase tracking-tighter">ПОИСК...</p>
                <div class="text-5xl font-black text-white mt-1">HP: <span id="enemy-hp">0</span></div>
            </div>
            <div class="text-right">
                <div id="enemy-pulse" class="w-4 h-4 rounded-full ml-auto bg-zinc-800 transition-all duration-500 shadow-lg mb-2"></div>
                <p id="enemy-conn-status" class="text-[8px] opacity-20 uppercase font-bold italic font-mono">LINKING...</p>
            </div>
        </div>

        <!-- Center Log -->
        <div class="flex flex-col items-center my-2">
            <div id="turn-indicator" class="text-2xl font-black uppercase tracking-[0.8em] mb-4 text-zinc-900 transition-all font-mono">АНАЛИЗ...</div>
            <div id="battle-log" class="h-32 overflow-y-auto w-full max-w-xl bg-black/80 p-6 border border-white/5 no-scrollbar text-[10px] leading-relaxed italic opacity-40 font-mono"></div>
        </div>

        <!-- Player -->
        <div class="flex flex-col gap-6">
            <div class="flex justify-between px-16">
                <div class="text-left border-l-4 border-[#00ffcc] pl-6">
                    <p class="text-[8px] opacity-40 uppercase tracking-[0.4em] mb-1 font-bold">Твой Протокол</p>
                    <p id="player-rank" class="text-xl font-black text-[#00ffcc] uppercase tracking-tighter font-mono">ПЕРВЫЙ</p>
                    <div class="text-5xl font-black text-white mt-1 font-mono">HP: <span id="player-hp">0</span></div>
                </div>
            </div>
            <!-- Hand -->
            <div id="hand" class="flex justify-center gap-2 h-44 items-end px-4 overflow-x-auto no-scrollbar">
                <p class="text-[9px] animate-pulse opacity-20 uppercase tracking-widest">Инициализация данных...</p>
            </div>
        </div>
    </div>

    <!-- END SCREEN -->
    <div id="screen-end" class="hidden fixed inset-0 z-[500] bg-black flex flex-col items-center justify-center text-center p-10 font-mono">
        <h1 id="end-title" class="text-7xl md:text-9xl font-black italic uppercase leading-none mb-6">ОБНУЛЕН</h1>
        <p id="end-sub" class="text-white uppercase tracking-[1em] text-sm md:text-xl mb-16 opacity-50">Цикл завершен.</p>
        <button onclick="location.reload()" class="px-16 py-6 border-4 border-white font-black uppercase tracking-widest text-xl hover:bg-white hover:text-black transition-all shadow-2xl">Вернуться</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, set, get, update, onValue, off, remove } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBMTaOtOQLsdJBLjN1AXO6X_NW47xSOMno",
            authDomain: "first-d1462.firebaseapp.com",
            projectId: "first-d1462",
            storageBucket: "first-d1462.firebasestorage.app",
            messagingSenderId: "965718104080",
            appId: "1:965718104080:web:0cd3a4aca0cc012a049295",
            databaseURL: "https://first-d1462-default-rtdb.europe-west1.firebasedatabase.app"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const CARDS = {
            STRIKE: { name: 'УКОЛ', desc: '-2 HP', color: 'glow-red', val: 2 },
            BLOCK: { name: 'БЛОК', desc: 'ЗАЩИТА', color: 'glow-blue' },
            ECHO: { name: 'ЭХО', desc: 'HP x 2', color: 'glow-gold' },
            ALL_IN: { name: 'ВА-БАНК', desc: '-4 HP / СБРОС', color: 'glow-gold', val: 4 },
            SHADOW: { name: 'ТЕНЬ', desc: 'УКЛОНЕНИЕ', color: 'glow-blue' }
        };

        const RANKS = [
            { name: 'Первый', min: 0, color: '#00ffcc', bonus: 2 },
            { name: 'Горожанин', min: 20, color: '#3399ff', bonus: 5 },
            { name: 'Магистр', min: 60, color: '#ffcc33', bonus: 15 },
            { name: 'Высший', min: 150, color: '#ff3366', bonus: 40 }
        ];

        let currentUser, userData, authMode = 'login', currentRoomId, myRole, isDead = false;

        function logStatus(msg) {
            const el = document.getElementById('status-log');
            const div = document.createElement('div');
            div.innerText = `> ${msg}`;
            el.appendChild(div);
        }

        // --- AUTH ---
        signInAnonymously(auth).then(() => {
            logStatus("База данных: Связь установлена");
            showScreen('screen-auth');
        }).catch(e => {
            logStatus("Ошибка связи. Проверьте консоль.");
            showScreen('screen-auth');
        });

        document.getElementById('auth-form').onsubmit = async (e) => {
            e.preventDefault();
            const login = document.getElementById('auth-login').value.trim().toUpperCase();
            const pass = document.getElementById('auth-password').value;
            const errEl = document.getElementById('auth-error');
            errEl.classList.add('hidden');

            const userRef = ref(db, 'users/' + login);
            try {
                const snap = await get(userRef);
                if (authMode === 'login') {
                    if (!snap.exists()) throw new Error("ID НЕ НАЙДЕН");
                    if (snap.val().password !== pass) throw new Error("КЛЮЧ НЕ ВЕРЕН");
                    userData = snap.val();
                } else {
                    if (snap.exists()) throw new Error("ID ЗАНЯТ");
                    userData = { login, password: pass, cards: 10, rank: 'Первый', wins: 0 };
                    await set(userRef, userData);
                }
                currentUser = login;
                updateLobbyUI();
                showScreen('screen-lobby');
            } catch (err) {
                errEl.innerText = err.message.toUpperCase();
                errEl.classList.remove('hidden');
            }
        };

        document.getElementById('toggle-auth').onclick = () => {
            authMode = authMode === 'login' ? 'register' : 'login';
            document.getElementById('toggle-auth').innerText = authMode === 'login' ? 'Создать новый аккаунт' : 'Вернуться ко входу';
            document.getElementById('auth-submit-btn').innerText = authMode === 'login' ? 'Войти' : 'Зарегистрировать';
        };

        // --- GAME ACTIONS ---
        window.createNewDuel = async () => {
            const id = Math.floor(1000 + Math.random() * 9000).toString();
            currentRoomId = id; myRole = 'player1';
            try {
                const initialHand = generateHand(10);
                await set(ref(db, 'rooms/' + id), {
                    status: "waiting",
                    player1: { login: currentUser, hp: 6, rank: userData.rank, hand: initialHand, blocking: false },
                    turn: "player1", lastAction: `Код доступа: ${id}`
                });
                showScreen('screen-game');
                listenToRoom(id);
            } catch (e) { alert("Ошибка доступа к базе!"); }
        };

        window.joinDuel = async () => {
            const id = document.getElementById('room-input').value;
            if (!id) return;
            currentRoomId = id; myRole = 'player2';
            try {
                const roomRef = ref(db, 'rooms/' + id);
                const snap = await get(roomRef);
                if (!snap.exists()) return alert("КАНАЛ НЕ НАЙДЕН");
                
                const initialHand = generateHand(10);
                await update(roomRef, {
                    player2: { login: currentUser, hp: 6, rank: userData.rank, hand: initialHand, blocking: false },
                    status: "active", lastAction: `${currentUser} ПОДКЛЮЧЕН`
                });
                showScreen('screen-game');
                listenToRoom(id);
            } catch (e) { alert("Ошибка подключения."); }
        };

        function generateHand(count = 10) { 
            const keys = Object.keys(CARDS);
            return Array.from({length: count}, () => keys[Math.floor(Math.random() * keys.length)]); 
        }

        function listenToRoom(id) {
            onValue(ref(db, 'rooms/' + id), (snap) => {
                const data = snap.val();
                if (!data) return;
                updateBattleUI(data);
            });
        }

        function updateBattleUI(data) {
            const me = data[myRole];
            if (!me) return;
            const enemyRole = myRole === 'player1' ? 'player2' : 'player1';
            const enemy = data[enemyRole];

            document.getElementById('player-hp').innerText = me.hp;
            document.getElementById('player-rank').innerText = me.rank;
            
            const eRankEl = document.getElementById('enemy-rank');
            const eHpEl = document.getElementById('enemy-hp');
            const ePulse = document.getElementById('enemy-pulse');
            const eStatus = document.getElementById('enemy-conn-status');

            if (enemy) {
                eRankEl.innerText = `${enemy.login} [${enemy.rank}]`;
                eHpEl.innerText = enemy.hp;
                ePulse.style.background = '#ff3366';
                ePulse.classList.add('animate-pulse');
                eStatus.innerText = "Signal Locked";
                eStatus.style.opacity = "1";
            }

            const isMyTurn = data.turn === myRole && data.status === 'active';
            const turnEl = document.getElementById('turn-indicator');
            if (data.status === 'waiting') {
                turnEl.innerText = "ОЖИДАНИЕ...";
                turnEl.style.color = "#444";
            } else {
                turnEl.innerText = isMyTurn ? "ТВОЙ ХОД" : "АНАЛИЗ ВРАГА";
                turnEl.style.color = isMyTurn ? "#00ffcc" : "#441111";
            }

            let handArray = me.hand ? Object.values(me.hand).filter(v => typeof v === 'string') : [];
            if (data.status === 'active' && handArray.length === 0 && !isDead) {
                const fallback = generateHand(10);
                update(ref(db, `rooms/${currentRoomId}/${myRole}`), { hand: fallback });
                handArray = fallback;
            }
            renderHand(handArray, isMyTurn);

            if(data.lastAction) addLog(data.lastAction);
            if (me.hp <= 0 && !isDead) resolveGame(false, enemy);
            if (enemy && enemy.hp <= 0 && !isDead) resolveGame(true, enemy);
        }

        function renderHand(hand, active) {
            const container = document.getElementById('hand'); 
            const newHandKeys = hand.join(',');
            if (container.dataset.hand === newHandKeys && container.dataset.active === String(active)) return;

            container.innerHTML = '';
            container.dataset.hand = newHandKeys;
            container.dataset.active = active;

            hand.forEach((key, idx) => {
                const c = CARDS[key];
                if (!c) return;
                const div = document.createElement('div');
                div.className = `card ${c.color} ${!active ? 'disabled' : ''}`;
                div.innerHTML = `
                    <div class="text-[7px] opacity-40 font-black tracking-widest">ID::${key}</div>
                    <div class="text-md font-black leading-none uppercase">${c.name}</div>
                    <div class="text-[7px] font-bold opacity-60 uppercase">${c.desc}</div>
                `;
                if(active) div.onclick = () => playCard(key, idx);
                container.appendChild(div);
            });
        }

        async function playCard(key, idx) {
            const roomRef = ref(db, 'rooms/' + currentRoomId);
            const snap = await get(roomRef);
            const data = snap.val();
            if (data.turn !== myRole || data.status !== 'active' || isDead) return;

            const enemyRole = myRole === 'player1' ? 'player2' : 'player1';
            const me = data[myRole], enemy = data[enemyRole];
            let nHand = Object.values(me.hand).filter(v => typeof v === 'string');
            nHand.splice(idx, 1);

            let nEnemyHp = enemy.hp, nMyHp = me.hp, act = "";

            if (key === 'STRIKE') {
                if (enemy.blocking) act = `${userData.login}: УКОЛ В БЛОК`;
                else { nEnemyHp -= 2; act = `${userData.login}: ПРЯМОЙ УКОЛ`; }
            } else if (key === 'BLOCK') act = `${userData.login}: ЗАЩИТА`;
            else if (key === 'ECHO') { nMyHp *= 2; act = `${userData.login}: ЭХО (X2)`; }
            else if (key === 'ALL_IN') { nEnemyHp -= 4; nHand = []; act = `${userData.login}: ВА-БАНК!`; }
            else if (key === 'SHADOW') act = `${userData.login}: ТЕНЬ`;

            if (nHand.length === 0) nHand = generateHand(10);

            await update(roomRef, {
                [enemyRole + '/hp']: Math.max(0, nEnemyHp), [enemyRole + '/blocking']: false,
                [myRole + '/hp']: nMyHp, [myRole + '/blocking']: (key === 'BLOCK' || key === 'SHADOW'),
                [myRole + '/hand']: nHand, turn: enemyRole, lastAction: act
            });
        }

        async function resolveGame(won, enemyData) {
            if (isDead) return;
            isDead = true; 
            off(ref(db, 'rooms/' + currentRoomId));
            
            if (won) {
                // Награда за ранг соперника
                const enemyRankInfo = RANKS.find(r => r.name === (enemyData ? enemyData.rank : 'Первый')) || RANKS[0];
                userData.cards = (userData.cards || 0) + enemyRankInfo.bonus;
                userData.wins = (userData.wins || 0) + 1;
            } else {
                // Обнуление
                userData.cards = 10;
                userData.wins = 0;
            }

            // Пересчет ранга
            const newRank = [...RANKS].reverse().find(r => userData.cards >= r.min) || RANKS[0];
            userData.rank = newRank.name;
            
            await set(ref(db, 'users/' + currentUser), userData);
            if (myRole === 'player1') setTimeout(() => remove(ref(db, 'rooms/' + currentRoomId)), 6000);
            
            showScreen('screen-end');
            const title = document.getElementById('end-title');
            if (won) { 
                title.innerText = "ВЫСШИЙ"; title.style.color = "#00ffcc"; 
                document.getElementById('end-sub').innerText = `РЕСУРС ПОПОЛНЕН. ТЕКУЩИЙ РАНГ: ${userData.rank}`;
            } else { 
                title.innerText = "ОБНУЛЕН"; title.style.color = "#ff3366"; 
                document.getElementById('end-sub').innerText = `ТЫ СНОВА НИКТО. РАНГ: ПЕРВЫЙ.`;
            }
        }

        function showScreen(id) {
            ['screen-loading', 'screen-auth', 'screen-lobby', 'screen-game', 'screen-end'].forEach(s => {
                const el = document.getElementById(s);
                if (s === id) el.classList.remove('hidden'); else el.classList.add('hidden');
            });
        }

        function updateLobbyUI() {
            const rankInfo = RANKS.find(r => r.name === userData.rank) || RANKS[0];
            document.getElementById('user-id-display').innerText = `USER::${currentUser}`;
            document.getElementById('lobby-rank').innerText = userData.rank;
            document.getElementById('lobby-rank').style.color = rankInfo.color;
            document.getElementById('lobby-cards').innerText = userData.cards;
        }

        function addLog(msg) {
            const log = document.getElementById('battle-log');
            if(log.firstChild && log.firstChild.innerText === `> ${msg}`) return;
            const div = document.createElement('div');
            div.className = "log-msg";
            div.innerText = `> ${msg}`;
            log.prepend(div);
        }
        window.oncontextmenu = (e) => e.preventDefault();
    </script>
</body>
</html>
